name: SolarCast Regional CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  DOCKER_IMAGE: solarcast-regional-api
  PYTHON_VERSION: "3.11"

jobs:

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Create dummy model artifacts for CI
        run: |
          mkdir -p model data
          python - <<'EOF'
          import numpy as np, joblib, os
          from sklearn.ensemble import RandomForestRegressor
          from sklearn.preprocessing import StandardScaler, LabelEncoder

          regions = ["East","North","South","West"]
          enc = LabelEncoder(); enc.fit(regions)
          
          X = np.random.randn(200, 10)
          y = np.random.rand(200) * 8
          sc = StandardScaler()
          X_sc = sc.fit_transform(X)
          m = RandomForestRegressor(n_estimators=5, max_depth=4, random_state=42)
          m.fit(X_sc, y)
          
          os.makedirs("model", exist_ok=True)
          joblib.dump(m,   "model/solar_model.pkl",  compress=3)
          joblib.dump(sc,  "model/scaler.pkl",       compress=3)
          joblib.dump(enc, "model/encoder.pkl",      compress=3)
          print("CI dummy artifacts created.")
          EOF

      - name: Run pytest
        run: python -m pytest tests/test_api.py -v --tb=short

      - name: Ensure pytest cache directory exists
        if: always()
        run: mkdir -p .pytest_cache

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7

  # ── Docker Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies for build
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - uses: docker/setup-buildx-action@v3

      - name: Create CI artifacts
        run: |
          mkdir -p model data
          python3 - <<'EOF'
          import numpy as np, joblib, os
          from sklearn.ensemble import RandomForestRegressor
          from sklearn.preprocessing import StandardScaler, LabelEncoder
          enc = LabelEncoder(); enc.fit(["East","North","South","West"])
          X = np.random.randn(200, 10); y = np.random.rand(200)*8
          sc = StandardScaler(); m = RandomForestRegressor(n_estimators=5, max_depth=4, random_state=42)
          m.fit(sc.fit_transform(X), y)
          joblib.dump(m, "model/solar_model.pkl", compress=3)
          joblib.dump(sc,"model/scaler.pkl",      compress=3)
          joblib.dump(enc,"model/encoder.pkl",    compress=3)
          EOF

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name solarcast-test -p 8000:8000 \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          sleep 12
          curl --fail http://localhost:8000/health
          curl --fail http://localhost:8000/
          echo "Container smoke test passed!"
          docker stop solarcast-test && docker rm solarcast-test

  # ── Publish (main only) ───────────────────────────────────────────────────────
  publish:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies for publish
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Create CI artifacts
        run: |
          mkdir -p model data
          python3 - <<'EOF'
          import numpy as np, joblib
          from sklearn.ensemble import RandomForestRegressor
          from sklearn.preprocessing import StandardScaler, LabelEncoder
          enc = LabelEncoder(); enc.fit(["East","North","South","West"])
          X = np.random.randn(200,10); y = np.random.rand(200)*8
          sc = StandardScaler(); m = RandomForestRegressor(n_estimators=5, max_depth=4, random_state=42)
          m.fit(sc.fit_transform(X), y)
          joblib.dump(m,"model/solar_model.pkl",compress=3)
          joblib.dump(sc,"model/scaler.pkl",compress=3)
          joblib.dump(enc,"model/encoder.pkl",compress=3)
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment summary
        run: |
          echo "## SolarCast Regional Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
