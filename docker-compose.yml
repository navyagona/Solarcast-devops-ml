version: "3.9"

networks:
  solarcast-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

services:

  # ── FastAPI Application ─────────────────────────────────────────────────────
  solarcast-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solarcast-api
    image: solarcast-api:2.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - solarcast-net

  # ── Streamlit Dashboard ─────────────────────────────────────────────────────
  solarcast-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solarcast-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./model:/app/model
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
    command: >
      streamlit run dashboard/dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    depends_on:
      solarcast-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - solarcast-net

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: solarcast-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    networks:
      - solarcast-net
    depends_on:
      - solarcast-api

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: solarcast-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=solarcast123
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - solarcast-net
    depends_on:
      - prometheus
